name: Check Core Team Membership
description: Outputs whether the PR creator is a core team member.

inputs:
  pr-author:
    description: 'The GitHub username of the PR creator (github.event.pull_request.user.login)'
    required: true

outputs:
  is-internal:
    description: "'true' if actor is in core team, 'false' otherwise"
    value: ${{ steps.check.outputs.is-internal }}

runs:
  using: composite
  steps:
    - name: Check membership
      id: check
      uses: actions/github-script@v7
      with:
        script: |
          echo secret
