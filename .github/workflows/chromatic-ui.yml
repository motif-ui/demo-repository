name: UI

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Minimal token scope. pull_request_target grants a base-repo-scoped GITHUB_TOKEN
# by default; keep it read-only so untrusted PR code cannot misuse it.
permissions:
  contents: read

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    # Security boundary: this job builds and runs PR code (possibly from a fork)
    # while the Chromatic token is in scope. The `development` environment's
    # required reviewer pauses the run until a maintainer approves it — review the
    # PR diff before approving. Approval is re-requested on every new push.
    environment: development
    continue-on-error: true
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: '0'
          # Do not leave the write-scoped GITHUB_TOKEN in .git/config where
          # build scripts of untrusted PR code could read it.
          persist-credentials: 'false'

      - uses: ./.github/actions/setup-node-deps

      - name: Build Storybook
        run: npm run build:storybook

      - name: Run Chromatic
        uses: chromaui/action@7804f34e4e59c0d9b3c856848f46ad96d7897429 # v17.5.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          storybookBuildDir: storybook-static/
          zip: true
          skip: "dependabot/**"
          autoAcceptChanges: "main"
          exitOnceUploaded: true