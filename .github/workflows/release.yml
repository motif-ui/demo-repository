name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # The 'environment' only applies to the workflow_dispatch trigger
    environment: ${{ github.event_name == 'workflow_dispatch' && 'release' || '' }}

    steps:
      - name: Generate bot app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-deps

      - name: Get bot user ID
        id: bot-user-id
        run: |
          echo "user-id=$(gh api "/users/${{ steps.generate_token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}

      # --- NEW STEP: PREVIEW LOGIC ---
      - name: Release Preview (Dry Run)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          npx semantic-release --dry-run > release_output.txt 2>&1
          VERSION=$(grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' release_output.txt || echo "")
          if [ -n "$VERSION" ]; then
            echo "### 🚀 Pending Release: v$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "To publish this version, run this workflow manually via **Actions > workflow_dispatch**." >> $GITHUB_STEP_SUMMARY
            sed -n '/### v/,$p' release_output.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ No changes since last release." >> $GITHUB_STEP_SUMMARY
          fi

      # --- ACTUAL PUBLISH LOGIC ---
      - name: Publish package
        if: github.event_name == 'workflow_dispatch'
        run: npx semantic-release
        env:
          HUSKY: 0
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          GIT_AUTHOR_NAME: "${{ steps.generate_token.outputs.app-slug }}[bot]"
          GIT_AUTHOR_EMAIL: "${{ steps.bot-user-id.outputs.user-id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "${{ steps.generate_token.outputs.app-slug }}[bot]"
          GIT_COMMITTER_EMAIL: "${{ steps.bot-user-id.outputs.user-id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Deploy Storybook
        if: github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: npm run build:storybook
          command: pages deploy ./storybook-static --project-name=motif-storybook