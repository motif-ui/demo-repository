name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  preview:
    name: Release Preview
    runs-on: ubuntu-latest
    outputs:
      release-type: ${{ steps.release-type.outputs.result }}
    steps:
      - name: Generate bot app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-deps

      - name: Determine release type from PR labels
        id: release-type
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            let lastTag;
            try {
              lastTag = execSync('git describe --tags --abbrev=0 2>/dev/null').toString().trim();
              core.info(`Last release tag: ${lastTag}`);
            } catch (e) {
              core.info('No previous tag found, scanning all commits.');
            }

            const range = lastTag ? `${lastTag}..HEAD` : 'HEAD';
            const commits = execSync(`git log --pretty=format:"%H" ${range}`)
              .toString().trim().split('\n').filter(Boolean);

            core.info(`Scanning ${commits.length} commits since ${lastTag || 'beginning'}`);

            const priority = { major: 3, minor: 2, patch: 1, none: 0 };
            let highest = 'none';

            for (const sha of commits) {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
              });

              for (const pr of prs) {
                for (const label of pr.labels) {
                  if (!label.name.startsWith('release:')) continue;
                  const type = label.name.split(':')[1];
                  if (priority[type] > priority[highest]) {
                    highest = type;
                    core.info(`Found "${label.name}" on PR #${pr.number} — upgrading to ${type}`);
                  }
                }
              }

              if (highest === 'major') break; // can't go higher
            }

            core.info(`Release type: ${highest}`);
            core.exportVariable('RELEASE_TYPE', highest);
            core.setOutput('result', highest);

      - name: Dry Run
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          npx semantic-release --dry-run > release_output.txt 2>&1 || DRY_RUN_FAILED=true
          cat release_output.txt
          VERSION=$(grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' release_output.txt || echo "")
          if [ -n "$VERSION" ]; then
            echo "### 🚀 Pending Release: v$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            sed -n '/### v/,$p' release_output.txt >> $GITHUB_STEP_SUMMARY
          elif [ "${DRY_RUN_FAILED}" = "true" ]; then
            echo "### ❌ Dry run failed — check the logs above for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ℹ️ No pending release — no release labels found on merged PRs." >> $GITHUB_STEP_SUMMARY
          fi

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [preview]
    if: needs.preview.outputs.release-type != 'none'
    environment: release
    steps:
      - name: Generate bot app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-deps

      - name: Set release type
        run: echo "RELEASE_TYPE=${{ needs.preview.outputs.release-type }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Get bot user ID
        id: bot-user-id
        run: |
          echo "user-id=$(gh api "/users/${{ steps.generate_token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Publish package
        run: npx semantic-release
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          GIT_AUTHOR_NAME: "${{ steps.generate_token.outputs.app-slug }}[bot]"
          GIT_AUTHOR_EMAIL: "${{ steps.bot-user-id.outputs.user-id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "${{ steps.generate_token.outputs.app-slug }}[bot]"
          GIT_COMMITTER_EMAIL: "${{ steps.bot-user-id.outputs.user-id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Deploy Storybook
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: npm run build:storybook
          command: pages deploy ./storybook-static --project-name=motif-storybook
