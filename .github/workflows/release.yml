name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  preview:
    name: Release Preview
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-deps

      - name: Dry Run
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          npx semantic-release --dry-run > release_output.txt 2>&1 || DRY_RUN_FAILED=true
          cat release_output.txt
          VERSION=$(grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' release_output.txt || echo "")
          if [ -n "$VERSION" ]; then
            echo "### 🚀 Pending Release: v$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            sed -n '/### v/,$p' release_output.txt >> $GITHUB_STEP_SUMMARY
          elif [ "${DRY_RUN_FAILED}" = "true" ]; then
            echo "### ❌ Dry run failed — check the logs above for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ℹ️ No pending release — no releasable changes since last version." >> $GITHUB_STEP_SUMMARY
          fi

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [preview]
    environment: release
    steps:
      - name: Generate bot app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-deps

      - name: Get bot user ID
        id: bot-user-id
        run: |
          echo "user-id=$(gh api "/users/${{ steps.generate_token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Publish package
        run: npx semantic-release
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          GIT_AUTHOR_NAME: "${{ steps.generate_token.outputs.app-slug }}[bot]"
          GIT_AUTHOR_EMAIL: "${{ steps.bot-user-id.outputs.user-id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "${{ steps.generate_token.outputs.app-slug }}[bot]"
          GIT_COMMITTER_EMAIL: "${{ steps.bot-user-id.outputs.user-id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Deploy Storybook
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: npm run build:storybook
          command: pages deploy ./storybook-static --project-name=motif-storybook
