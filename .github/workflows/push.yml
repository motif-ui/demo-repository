name: Release Preview

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-node.yml

  preview:
    runs-on: ubuntu-latest
    needs: [ ci ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: 'false'

      - uses: ./.github/actions/setup-node-deps

      - name: Semantic Release Dry Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Run dry-run. We use '|| true' because semantic-release exits with 1 if no release is found.
          npx semantic-release --dry-run > release_output.txt 2>&1 || true

          # 2. Parse the version from the output
          VERSION=$(grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' release_output.txt || echo "")

          # 3. Write to the GitHub Action Summary page
          if [ -n "$VERSION" ]; then
            echo "### 🚀 Pending Release: v$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "To publish this, go to **Actions > Publish** and run the workflow manually." >> $GITHUB_STEP_SUMMARY
            echo "#### Proposed Changelog:" >> $GITHUB_STEP_SUMMARY
            # Extract only the markdown notes
            sed -n '/### v/,$p' release_output.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ No release-worthy commits detected." >> $GITHUB_STEP_SUMMARY
            echo "Only commits following Conventional Commits (feat, fix, etc.) will trigger a version bump." >> $GITHUB_STEP_SUMMARY
          fi