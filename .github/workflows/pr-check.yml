name: PR Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            perf
            feat
            fix
            docs
            style
            refactor
            test
            chore
            build
            ci
            revert
          requireScope: false
          validateSingleCommit: false

      # Sonraki workflow için metadata kaydet
      - name: Save PR metadata
        run: |
          mkdir -p artifacts
          echo '${{ github.event.pull_request.number }}' > artifacts/pr_number
          echo '${{ github.event.pull_request.title }}' > artifacts/pr_title
          echo '${{ github.event.pull_request.user.login }}' > artifacts/pr_author
          echo '${{ github.event.pull_request.body }}' > artifacts/pr_body

      - uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: artifacts/