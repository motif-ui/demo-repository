name: "PR Validator"

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    name: PR Compliance Check
    runs-on: ubuntu-latest
    steps:
      # SECURITY: Check out the BASE repo (default in pull_request_target — no repo/ref override).
      # This ensures all local actions (uses: ./.github/...) resolve to OUR trusted code,
      # never the fork's. The fork's files are never checked out in this job.
      - name: Checkout base repository
        uses: actions/checkout@v4
        # No 'repository' or 'ref' override — defaults to the base branch. This is intentional.

      # 1. IDENTIFY USER ROLE
      # Safe: resolves to the base repo's action (checked out above, not the fork's).
      - name: Check core team membership
        id: team-check
        uses: ./.github/actions/check-core-team
        with:
          pr-author: ${{ github.event.pull_request.user.login }}
