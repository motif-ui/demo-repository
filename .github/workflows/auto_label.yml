name: Auto Label

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  auto_label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: 'false'

      - name: Check core team membership
        id: team-check
        uses: ./.github/actions/check-core-team
        with:
          core-team: ${{ vars.CORE_TEAM }}

      - name: Apply label
        uses: actions/github-script@v7
        env:
          IS_INTERNAL: ${{ steps.team-check.outputs.is-internal }}
        with:
          script: |
            const isInternal = process.env.IS_INTERNAL === 'true';
            const label = isInternal ? 'internal' : 'needs triage';

            core.info(`Applying label: ${label}`);

            const issueNumber =
              context.eventName === 'pull_request'
                ? context.payload.pull_request.number
                : context.payload.issue.number;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [label],
            });
