name: "Workflow Protection"

# SECURITY DESIGN:
# This workflow uses the 'pull_request' event (NOT pull_request_target).
# - It runs with a RESTRICTED GITHUB_TOKEN (read-only, no secrets).
# - It is safe to checkout and analyze fork code here.
# - Privileged operations (label writes, etc.) are handled in pr-validator.yml
#   via pull_request_target, which never checks out fork code.
#
# This separation is the defense against "poisoned pipeline" / fork PR attacks:
# untrusted code runs here (no secrets), trusted operations run in pr-validator (no fork code).

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '.github/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  protect:
    name: Detect Workflow Tampering
    runs-on: ubuntu-latest
    steps:
      # Safe: pull_request event checks out fork code with no secrets available.
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false

      - name: Check if actor is a repo collaborator
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.pull_request.user.login,
              });
              const authorized = ['admin', 'maintain', 'write'].includes(data.role_name);
              core.setOutput('authorized', String(authorized));
            } catch {
              core.setOutput('authorized', 'false');
            }

      - name: Get changed files under .github/
        id: changed
        uses: tj-actions/changed-files@6b2903bdce6310cfbddd87c418f253cf29b2dec9 # pin to SHA — v44 tag was compromised in Mar 2025
        with:
          files: |
            .github/workflows/**
            .github/actions/**

      - name: Fail on unauthorized .github/ changes
        if: steps.changed.outputs.any_changed == 'true' && steps.auth.outputs.authorized != 'true'
        run: |
          echo "❌ This PR modifies workflow or action files."
          echo "Only collaborators with write/maintain/admin access may change files under .github/."
          echo "Changed files:"
          echo "${{ steps.changed.outputs.all_changed_files }}"
          exit 1
