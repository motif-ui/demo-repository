name: "Workflow Protection"

# SECURITY DESIGN:
# This workflow uses the 'pull_request' event (NOT pull_request_target).
# - It runs with a RESTRICTED GITHUB_TOKEN (read-only, no secrets).
# - It is safe to checkout and analyze fork code here.
# - Privileged operations (label writes, etc.) are handled in pr-validator.yml
#   via pull_request_target, which never checks out fork code.
#
# This separation is the defense against "poisoned pipeline" / fork PR attacks:
# untrusted code runs here (no secrets), trusted operations run in pr-validator (no fork code).

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  protect:
    name: Detect Workflow Tampering
    runs-on: ubuntu-latest
    steps:
      # No checkout needed — all checks use the GitHub API.
      # This avoids credentials entirely and removes the tj-actions dependency.

      - name: Check for unauthorized .github/ changes
        uses: actions/github-script@v7
        with:
          script: |
            // 1. Get all files changed in this PR via API (no git fetch needed)
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const sensitiveFiles = files.filter(f =>
              f.filename.startsWith('.github/workflows/') ||
              f.filename.startsWith('.github/actions/')
            );

            if (sensitiveFiles.length === 0) {
              core.info('No workflow or action files changed. ✅');
              return;
            }

            // 2. Check if the PR author is an authorized collaborator
            let authorized = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.pull_request.user.login,
              });
              authorized = ['admin', 'maintain', 'write'].includes(data.role_name);
            } catch {
              authorized = false;
            }

            if (!authorized) {
              const changed = sensitiveFiles.map(f => `  - ${f.filename}`).join('\n');
              core.setFailed(
                `❌ This PR modifies protected files and the author is not an authorized collaborator.\n` +
                `Changed files:\n${changed}`
              );
            } else {
              core.info(`Authorized collaborator modifying .github/ files. ✅`);
            }
